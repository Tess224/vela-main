publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: 1.0.8
  go_router: 14.8.1
  flutter_riverpod: 2.6.1
  supabase_flutter: 2.12.2
  http: 1.2.2
  http_parser: 4.0.2
  health: 10.2.0
  record: 5.1.2
  just_audio: 0.9.42
