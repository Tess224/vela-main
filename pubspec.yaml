name: vela_main
description: "Vela — AI voice health companion"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.6.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: 1.0.8
  go_router: 14.8.1
  flutter_riverpod: 2.6.1
  supabase_flutter: 2.12.2
  http: 1.2.2
  http_parser: 4.0.2
  record: 5.1.2
  just_audio: 0.9.42
  firebase_messaging: 15.1.6
  firebase_core: 3.8.1
  permission_handler: 11.4.0
  flutter_secure_storage: 9.2.4
  workmanager: 0.5.2
  flutter_local_notifications: 18.0.1
  device_info_plus: 10.1.2
  url_launcher: 6.2.5
  app_links: 6.4.1
  health: 11.0.0
  pinenacl: 0.6.0
  bs58: 1.0.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/icon/vela_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

dependency_overrides:
  record_linux: 1.3.0